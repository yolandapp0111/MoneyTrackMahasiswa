name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit

  frontend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npx eslint .

      - run: npx tsc -b --noEmit

      - run: npm run build

  api-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: money_track_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: node setup_db.js
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: money_track_db

      - name: Start server
        run: |
          npx ts-node src/server.ts &
          sleep 5

      - name: Test registration
        run: |
          curl -s -X POST http://localhost:5000/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"nama_lengkap":"CI Test","nim":"CI0001","email":"ci@test.com","password":"test123"}' \
            | grep -q "Registrasi berhasil" && echo "REGISTER: PASS" || echo "REGISTER: FAIL"

      - name: Test login
        run: |
          curl -s -X POST http://localhost:5000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"nim":"CI0001","password":"test123"}' \
            | grep -q "Login berhasil" && echo "LOGIN: PASS" || echo "LOGIN: FAIL"

      - name: Test duplicate registration
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:5000/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"nama_lengkap":"CI Test","nim":"CI0001","email":"ci@test.com","password":"test123"}')
          echo "$RESPONSE" | grep -q "sudah terdaftar" && echo "DUPLICATE CHECK: PASS" || echo "DUPLICATE CHECK: FAIL"
